<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8. Sınıf Matematik – Soru Üretici</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #1a202c; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #2b6cb0, #2c5282);
    color: white; padding: 18px 32px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  header h1 { font-size: 1.3rem; font-weight: 600; }
  header span { font-size: 0.85rem; opacity: 0.8; margin-left: auto; }

  .container { display: flex; gap: 20px; padding: 20px; max-width: 1300px; margin: 0 auto; }

  /* SOL PANEL – Kazanımlar */
  .panel-left {
    width: 360px; flex-shrink: 0;
    background: white; border-radius: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    overflow: hidden;
  }
  .panel-left-header {
    background: #ebf4ff; padding: 14px 16px;
    font-weight: 600; font-size: 0.95rem; color: #2b6cb0;
    border-bottom: 1px solid #bee3f8;
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel-left-header button {
    font-size: 0.75rem; color: #4a90d9; background: none; border: none; cursor: pointer;
  }
  .kazanim-list { max-height: calc(100vh - 160px); overflow-y: auto; padding: 8px 0; }

  .unite-block { border-bottom: 1px solid #f0f4f8; }
  .unite-header {
    padding: 10px 16px; font-weight: 600; font-size: 0.82rem;
    color: #4a5568; background: #f7fafc; cursor: pointer;
    display: flex; align-items: center; gap: 8px; user-select: none;
  }
  .unite-header:hover { background: #edf2f7; }
  .unite-arrow { transition: transform 0.2s; font-size: 0.7rem; }
  .unite-header.open .unite-arrow { transform: rotate(90deg); }
  .unite-body { display: none; }
  .unite-body.open { display: block; }

  .konu-block { padding: 0; }
  .konu-header {
    padding: 8px 16px 8px 28px; font-weight: 500; font-size: 0.85rem;
    color: #2d3748; cursor: pointer; display: flex; align-items: center; gap: 8px;
    user-select: none;
  }
  .konu-header:hover { background: #f7fafc; }
  .konu-arrow { transition: transform 0.2s; font-size: 0.65rem; color: #718096; }
  .konu-header.open .konu-arrow { transform: rotate(90deg); }
  .konu-kazanimlar { display: none; padding: 2px 0 6px 0; }
  .konu-kazanimlar.open { display: block; }

  .kazanim-item {
    padding: 6px 16px 6px 40px; display: flex; align-items: flex-start; gap: 10px;
    cursor: pointer; transition: background 0.15s;
  }
  .kazanim-item:hover { background: #ebf8ff; }
  .kazanim-item input[type=checkbox] { margin-top: 2px; accent-color: #2b6cb0; cursor: pointer; }
  .kazanim-label { font-size: 0.82rem; line-height: 1.4; color: #4a5568; cursor: pointer; }
  .kazanim-kod { font-weight: 600; color: #2b6cb0; font-size: 0.78rem; }

  /* SAĞ PANEL – Üretici */
  .panel-right { flex: 1; display: flex; flex-direction: column; gap: 16px; }

  .card {
    background: white; border-radius: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1); padding: 20px;
  }
  .card-title { font-weight: 600; font-size: 0.9rem; color: #4a5568; margin-bottom: 12px; }

  /* Seçili kazanımlar */
  .secili-bos { color: #a0aec0; font-size: 0.85rem; font-style: italic; }
  .tags { display: flex; flex-wrap: wrap; gap: 8px; min-height: 32px; }
  .tag {
    background: #ebf4ff; color: #2b6cb0; border: 1px solid #bee3f8;
    border-radius: 20px; padding: 4px 12px; font-size: 0.8rem; font-weight: 500;
    display: flex; align-items: center; gap: 6px;
  }
  .tag button {
    background: none; border: none; color: #718096; cursor: pointer;
    font-size: 1rem; line-height: 1; padding: 0;
  }
  .tag button:hover { color: #e53e3e; }

  /* Zorluk */
  .zorluk-btns { display: flex; gap: 10px; }
  .zorluk-btn {
    flex: 1; padding: 10px; border: 2px solid #e2e8f0; border-radius: 8px;
    background: white; font-size: 0.9rem; font-weight: 500; cursor: pointer;
    transition: all 0.15s; color: #4a5568;
  }
  .zorluk-btn:hover { border-color: #90cdf4; background: #ebf8ff; }
  .zorluk-btn.active.kolay { border-color: #68d391; background: #f0fff4; color: #276749; }
  .zorluk-btn.active.orta { border-color: #f6ad55; background: #fffaf0; color: #744210; }
  .zorluk-btn.active.zor { border-color: #fc8181; background: #fff5f5; color: #742a2a; }

  /* Konu adı */
  #konuAdi {
    width: 100%; padding: 10px 14px; border: 2px solid #e2e8f0;
    border-radius: 8px; font-size: 0.9rem; color: #2d3748;
    outline: none; transition: border-color 0.15s;
  }
  #konuAdi:focus { border-color: #90cdf4; }

  /* Üret butonu */
  #uretBtn {
    width: 100%; padding: 14px; background: linear-gradient(135deg, #2b6cb0, #2c5282);
    color: white; border: none; border-radius: 10px; font-size: 1rem;
    font-weight: 600; cursor: pointer; transition: opacity 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  #uretBtn:hover:not(:disabled) { opacity: 0.9; }
  #uretBtn:disabled { opacity: 0.6; cursor: not-allowed; }
  .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Soru kartı */
  #soruKart { display: none; }
  .soru-baslik { font-size: 1rem; font-weight: 700; color: #1a202c; line-height: 1.6; margin-bottom: 16px; }
  .secenekler { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .secenek {
    padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 8px;
    font-size: 0.9rem; cursor: pointer; transition: all 0.15s;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .secenek:hover { border-color: #90cdf4; background: #ebf8ff; }
  .secenek.dogru { border-color: #68d391; background: #f0fff4; color: #276749; }
  .secenek.yanlis { border-color: #fc8181; background: #fff5f5; color: #742a2a; }
  .secenek-harf { font-weight: 700; min-width: 20px; }

  .meta-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
  .meta-badge {
    background: #f7fafc; border: 1px solid #e2e8f0;
    border-radius: 6px; padding: 4px 10px; font-size: 0.78rem; color: #718096;
  }
  .meta-badge b { color: #4a5568; }

  .aciklama-box {
    background: #fffff0; border-left: 4px solid #ecc94b;
    padding: 12px 14px; border-radius: 0 8px 8px 0;
    font-size: 0.85rem; color: #744210; margin-bottom: 16px; display: none;
  }

  .soru-alt { display: flex; gap: 10px; }
  .soru-alt button {
    flex: 1; padding: 10px; border-radius: 8px; font-size: 0.85rem;
    font-weight: 500; cursor: pointer; border: 2px solid;
  }
  #cevapBtn { border-color: #2b6cb0; color: #2b6cb0; background: white; }
  #cevapBtn:hover { background: #ebf4ff; }
  #yeniBtn { border-color: #48bb78; color: #276749; background: white; }
  #yeniBtn:hover { background: #f0fff4; }

  .nlm-durum {
    font-size: 0.78rem; padding: 6px 12px; border-radius: 6px; margin-top: 10px;
    display: none;
  }
  .nlm-durum.ok { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; }
  .nlm-durum.err { background: #fff5f5; color: #742a2a; border: 1px solid #fc8181; }

  /* Hata */
  #hataBox { display: none; background: #fff5f5; border: 1px solid #fc8181; border-radius: 10px; padding: 16px; color: #742a2a; font-size: 0.9rem; }

  /* Loading overlay */
  #yukleniyor {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35);
    z-index: 999; align-items: center; justify-content: center; flex-direction: column; gap: 16px;
  }
  #yukleniyor.aktif { display: flex; }
  .yukleniyor-kart { background: white; border-radius: 14px; padding: 32px 40px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
  .buyuk-spinner { width: 48px; height: 48px; border: 4px solid #bee3f8; border-top-color: #2b6cb0; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  .yukleniyor-kart p { color: #4a5568; font-size: 0.95rem; }
  .yukleniyor-kart small { color: #a0aec0; font-size: 0.8rem; }
</style>
</head>
<body>

<header>
  <div>📐</div>
  <h1>8. Sınıf Matematik – Soru Üretici</h1>
  <span>NotebookLM + Claude</span>
</header>

<div class="container">

  <!-- SOL: Kazanım Seçici -->
  <div class="panel-left">
    <div class="panel-left-header">
      Kazanım Seç
      <button onclick="tumunuTemizle()">Seçimi Temizle</button>
    </div>
    <div class="kazanim-list" id="kazanimAgaci"></div>
  </div>

  <!-- SAĞ: Kontrol + Sonuç -->
  <div class="panel-right">

    <!-- Seçili kazanımlar -->
    <div class="card">
      <div class="card-title">Seçili Kazanımlar</div>
      <div class="tags" id="tagsAlani">
        <span class="secili-bos" id="bosMetin">Soldan kazanım seçin...</span>
      </div>
    </div>

    <!-- Ayarlar -->
    <div class="card">
      <div class="card-title" style="margin-bottom:8px;">Konu Adı (PDF dosya adı için)</div>
      <input type="text" id="konuAdi" placeholder="Örn: Doğrusal Denklemler" />

      <div class="card-title" style="margin-top:16px; margin-bottom:8px;">Zorluk Derecesi</div>
      <div class="zorluk-btns">
        <button class="zorluk-btn kolay" onclick="zorlukSec('Kolay')">🟢 Kolay</button>
        <button class="zorluk-btn orta active" onclick="zorlukSec('Orta')">🟡 Orta</button>
        <button class="zorluk-btn zor" onclick="zorlukSec('Zor')">🔴 Zor</button>
      </div>
    </div>

    <!-- Üret Butonu -->
    <button id="uretBtn" onclick="soruUret()">
      <span>✨ Soru Üret</span>
    </button>

    <!-- Hata -->
    <div id="hataBox"></div>

    <!-- Soru Kartı -->
    <div class="card" id="soruKart">
      <div class="meta-row" id="metaRow"></div>
      <div class="soru-baslik" id="soruMetni"></div>
      <div class="secenekler" id="seceneklerAlani"></div>
      <div class="aciklama-box" id="aciklamaBox"></div>
      <div class="soru-alt">
        <button id="cevapBtn" onclick="cevapGoster()">💡 Cevabı Göster</button>
        <button id="yeniBtn" onclick="yeniSoru()">🔄 Yeni Soru</button>
      </div>
      <div class="nlm-durum" id="nlmDurum"></div>
    </div>

  </div>
</div>

<!-- Loading -->
<div id="yukleniyor">
  <div class="yukleniyor-kart">
    <div class="buyuk-spinner"></div>
    <p>Soru üretiliyor...</p>
    <small>NotebookLM sorgulanıyor ve Claude yazıyor</small>
  </div>
</div>

<script>
let seciliKazanimlar = [];
let seciliZorluk = 'Orta';
let dogruCevap = '';

// Kazanım ağacını yükle
fetch('/api/kazanimlar')
  .then(r => r.json())
  .then(data => {
    const agac = document.getElementById('kazanimAgaci');
    agac.innerHTML = '';

    Object.values(data).forEach(unite => {
      const uniteDiv = document.createElement('div');
      uniteDiv.className = 'unite-block';

      const uniteHeader = document.createElement('div');
      uniteHeader.className = 'unite-header';
      uniteHeader.innerHTML = `<span class="unite-arrow">▶</span> ${unite.ad}`;
      uniteHeader.onclick = () => {
        const body = uniteDiv.querySelector('.unite-body');
        body.classList.toggle('open');
        uniteHeader.classList.toggle('open');
      };

      const uniteBody = document.createElement('div');
      uniteBody.className = 'unite-body';

      unite.konular.forEach(konu => {
        const konuDiv = document.createElement('div');
        konuDiv.className = 'konu-block';

        const konuHeader = document.createElement('div');
        konuHeader.className = 'konu-header';
        konuHeader.innerHTML = `<span class="konu-arrow">▶</span> ${konu.ad}`;
        konuHeader.onclick = () => {
          const body = konuDiv.querySelector('.konu-kazanimlar');
          body.classList.toggle('open');
          konuHeader.classList.toggle('open');
        };

        const kazanimlarDiv = document.createElement('div');
        kazanimlarDiv.className = 'konu-kazanimlar';

        konu.kazanimlar.forEach(k => {
          const item = document.createElement('div');
          item.className = 'kazanim-item';
          item.dataset.kod = k.kod;
          item.dataset.metin = k.metin;
          item.dataset.konu = konu.ad;

          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.id = `cb_${k.kod.replace(/\./g, '_')}`;

          const label = document.createElement('label');
          label.htmlFor = cb.id;
          label.className = 'kazanim-label';
          label.innerHTML = `<span class="kazanim-kod">${k.kod}</span><br>${k.metin}`;

          cb.onchange = () => kazanimToggle(k.kod, k.metin, konu.ad, cb.checked, item);
          item.onclick = (e) => { if (e.target !== cb) { cb.checked = !cb.checked; cb.onchange(); } };

          item.appendChild(cb);
          item.appendChild(label);
          kazanimlarDiv.appendChild(item);
        });

        konuDiv.appendChild(konuHeader);
        konuDiv.appendChild(kazanimlarDiv);
        uniteBody.appendChild(konuDiv);
      });

      uniteDiv.appendChild(uniteHeader);
      uniteDiv.appendChild(uniteBody);
      agac.appendChild(uniteDiv);
    });
  });

function kazanimToggle(kod, metin, konu, eklendi, itemEl) {
  if (eklendi) {
    if (!seciliKazanimlar.find(k => k.kod === kod)) {
      seciliKazanimlar.push({ kod, metin, konu });
      itemEl.style.background = '#ebf8ff';
    }
  } else {
    seciliKazanimlar = seciliKazanimlar.filter(k => k.kod !== kod);
    itemEl.style.background = '';
  }
  taglariGuncelle();
}

function taglariGuncelle() {
  const alan = document.getElementById('tagsAlani');
  const bos = document.getElementById('bosMetin');

  if (seciliKazanimlar.length === 0) {
    alan.innerHTML = '<span class="secili-bos" id="bosMetin">Soldan kazanım seçin...</span>';
    return;
  }

  alan.innerHTML = '';
  seciliKazanimlar.forEach(k => {
    const tag = document.createElement('div');
    tag.className = 'tag';
    tag.innerHTML = `${k.kod} <button onclick="kazanimKaldir('${k.kod}')" title="Kaldır">×</button>`;
    alan.appendChild(tag);
  });
}

function kazanimKaldir(kod) {
  const cb = document.getElementById(`cb_${kod.replace(/\./g, '_')}`);
  if (cb) {
    cb.checked = false;
    const item = cb.closest('.kazanim-item');
    if (item) item.style.background = '';
  }
  seciliKazanimlar = seciliKazanimlar.filter(k => k.kod !== kod);
  taglariGuncelle();
}

function tumunuTemizle() {
  seciliKazanimlar = [];
  document.querySelectorAll('.kazanim-item input[type=checkbox]').forEach(cb => cb.checked = false);
  document.querySelectorAll('.kazanim-item').forEach(el => el.style.background = '');
  taglariGuncelle();
}

function zorlukSec(zorluk) {
  seciliZorluk = zorluk;
  document.querySelectorAll('.zorluk-btn').forEach(b => b.classList.remove('active'));
  const idx = ['Kolay', 'Orta', 'Zor'].indexOf(zorluk);
  document.querySelectorAll('.zorluk-btn')[idx].classList.add('active');
}

async function soruUret() {
  if (seciliKazanimlar.length === 0) {
    alert('Lütfen en az bir kazanım seçin.');
    return;
  }

  const konuAdi = document.getElementById('konuAdi').value.trim() || 'Karma';

  document.getElementById('yukleniyor').classList.add('aktif');
  document.getElementById('uretBtn').disabled = true;
  document.getElementById('soruKart').style.display = 'none';
  document.getElementById('hataBox').style.display = 'none';

  try {
    const resp = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        kazanimlar: seciliKazanimlar,
        zorluk: seciliZorluk,
        konu_adi: konuAdi
      })
    });

    const data = await resp.json();

    if (!resp.ok || data.error) {
      throw new Error(data.error || 'Bilinmeyen hata');
    }

    soruGoster(data);

  } catch (err) {
    const hata = document.getElementById('hataBox');
    hata.style.display = 'block';
    hata.textContent = '❌ ' + err.message;
  } finally {
    document.getElementById('yukleniyor').classList.remove('aktif');
    document.getElementById('uretBtn').disabled = false;
  }
}

function soruGoster(data) {
  dogruCevap = data.dogru_cevap;

  // Meta
  const metaRow = document.getElementById('metaRow');
  const kazanim_str = (data.kazanimlar || []).join(', ');
  metaRow.innerHTML = `
    <div class="meta-badge"><b>Zorluk:</b> ${seciliZorluk}</div>
    <div class="meta-badge"><b>Bloom:</b> ${data.bloom_seviyesi || '—'}</div>
    <div class="meta-badge"><b>Kazanım:</b> ${kazanim_str}</div>
    ${data.pdf_adi ? `<div class="meta-badge">📄 ${data.pdf_adi}</div>` : ''}
  `;

  // Soru
  document.getElementById('soruMetni').textContent = data.soru;

  // Şıklar
  const alan = document.getElementById('seceneklerAlani');
  alan.innerHTML = '';
  Object.entries(data.secenekler).forEach(([harf, metin]) => {
    const div = document.createElement('div');
    div.className = 'secenek';
    div.dataset.harf = harf;
    div.innerHTML = `<span class="secenek-harf">${harf})</span> ${metin}`;
    alan.appendChild(div);
  });

  // Açıklama gizle
  const aciklama = document.getElementById('aciklamaBox');
  aciklama.style.display = 'none';
  aciklama.textContent = data.aciklama || '';

  // Cevap butonu sıfırla
  document.getElementById('cevapBtn').style.display = 'inline-block';

  // NotebookLM durumu
  const nlm = document.getElementById('nlmDurum');
  if (data.notebooklm_kaydedildi) {
    nlm.className = 'nlm-durum ok';
    nlm.textContent = `✅ NotebookLM'e kaydedildi: ${data.pdf_adi}`;
  } else {
    nlm.className = 'nlm-durum err';
    nlm.textContent = '⚠️ NotebookLM kaydı başarısız (PDF output klasöründe mevcut)';
  }
  nlm.style.display = 'block';

  document.getElementById('soruKart').style.display = 'block';
}

function cevapGoster() {
  document.querySelectorAll('.secenek').forEach(el => {
    if (el.dataset.harf === dogruCevap) el.classList.add('dogru');
    else el.classList.add('yanlis');
  });
  const aciklama = document.getElementById('aciklamaBox');
  aciklama.textContent = '💡 ' + (aciklama.textContent || '');
  aciklama.style.display = 'block';
  document.getElementById('cevapBtn').style.display = 'none';
}

function yeniSoru() {
  document.getElementById('soruKart').style.display = 'none';
  document.getElementById('hataBox').style.display = 'none';
}
</script>
</body>
</html>
